# owner: allaouiyounespro / portfolio: github.com/allaouiyounespro
#
# The witness pod needs exactly one thing from the Kubernetes API: the
# topology.kubernetes.io/zone label of the node it landed on. There is no
# narrower permission than "get nodes" for that - node labels are not exposed
# through the downward API - so this is the floor, not a shortcut.
#
# Note what is NOT here: no list, no watch, no access to secrets, no namespace
# scope beyond its own. A get on a named node is about as inert as a cluster-
# scoped permission gets.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: witness
  namespace: witness
  labels:
    app.kubernetes.io/name: witness
    owner: allaouiyounespro
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: witness-node-reader
  labels:
    app.kubernetes.io/name: witness
    owner: allaouiyounespro
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: witness-node-reader
  labels:
    app.kubernetes.io/name: witness
    owner: allaouiyounespro
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: witness-node-reader
subjects:
  - kind: ServiceAccount
    name: witness
    namespace: witness
