# owner: allaouiyounespro / portfolio: github.com/allaouiyounespro
#
# The witness workload. Six replicas, because six divides cleanly by three AZs
# and by one AZ, so neither architecture gets an accidental rounding advantage.
#
# WITNESS_IMAGE is substituted by scripts/bootstrap-cluster.sh.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: witness-config
  namespace: witness
  labels:
    app.kubernetes.io/name: witness
    owner: allaouiyounespro
data:
  # DB_HOST is patched in by the bootstrap script from the stack's terraform
  # output. It is identical before and after an RDS failover - the endpoint is a
  # DNS record that AWS repoints at the standby - which is the entire reason the
  # app needs no failover logic of its own.
  DB_HOST: "PLACEHOLDER_DB_HOST"
  DB_PORT: "5432"
  DB_NAME: "resilience"
  DB_USER: "app"
  DB_PASSWORD_FILE: "/etc/db/password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: witness
  namespace: witness
  labels:
    app.kubernetes.io/name: witness
    app.kubernetes.io/part-of: eks-resilience-finops
    owner: allaouiyounespro
spec:
  replicas: 6
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app.kubernetes.io/name: witness

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2

  template:
    metadata:
      labels:
        app.kubernetes.io/name: witness
        app.kubernetes.io/part-of: eks-resilience-finops
        owner: allaouiyounespro
    spec:
      serviceAccountName: witness

      # 30s is not arbitrary. The NLB takes ~20s to deregister a target, so a
      # pod that exits immediately on SIGTERM keeps receiving connections it can
      # no longer serve - manufacturing errors during a *graceful* event and
      # contaminating the RTO measurement with self-inflicted 502s.
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      # ---------------------------------------------------------------------
      # Placement
      #
      # This block is where the two architectures diverge at runtime, without a
      # single line of it changing between them.
      #
      # In infra-b, Karpenter has three zones to satisfy the spread constraint
      # with, so the six replicas land 2/2/2. Losing an AZ costs two pods and
      # four keep serving.
      #
      # In infra-a, the NodePool permits exactly one zone. The spread constraint
      # is trivially satisfied (skew 0 across one zone) and all six pods sit in
      # the same failure domain. Losing that AZ costs all six.
      #
      # Identical manifest, opposite outcomes. The resilience lives in the
      # infrastructure, not in the application - which is exactly the claim the
      # experiment is testing.
      # ---------------------------------------------------------------------
      # Spread across ZONES only. There is deliberately no hostname spread here,
      # and the reason cost 172 USD/month to learn:
      #
      # A `kubernetes.io/hostname` constraint with maxSkew 1 means one pod per
      # node. Karpenter's scheduler simulates the constraint before it launches
      # anything, concludes it needs six nodes to place six pods, and launches
      # six nodes - even though all six pods together fit on one t3.medium with
      # room to spare. The cluster comes up green, the dashboard looks fine, and
      # the compute bill is 6x what the cost model predicted. Nothing warns you.
      #
      # Dropping it, Karpenter packs the pods per zone: one node in infra-a
      # (all six pods), three in infra-b (two per zone). Which is exactly what
      # the FinOps model prices, and exactly what the resilience story needs -
      # the failure domain being tested is the AZ, not the node.
      #
      # The tradeoff is real and worth stating: losing a single node now costs
      # two pods in infra-b rather than one. That is acceptable. Paying for five
      # idle nodes to soften a failure mode nobody is measuring is not.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone

          # DoNotSchedule. This was ScheduleAnyway, and ScheduleAnyway does
          # nothing:
          #
          # It is a preference, not a rule. Karpenter dutifully provisioned three
          # nodes, one per zone - and the kube-scheduler put all six pods on
          # whichever node reached Ready first, because a soft constraint gives it
          # no reason to wait. infra-b came up with 6/0/0. It was infra-a wearing
          # a 222 USD/month costume, and every dashboard was green.
          #
          # Worse, consolidateAfter would then have reclaimed the two empty nodes
          # and left one node in one zone - the exact single point of failure this
          # architecture exists to remove, arrived at automatically, five minutes
          # after a successful deploy.
          #
          # The comment that used to live here argued DoNotSchedule was unsafe:
          # that during the fault it would refuse to place replacement pods into
          # the surviving zones, because doing so breaches maxSkew against the
          # dead zone sitting at zero. That reasoning was wrong, and the fix is
          # the line below it.
          whenUnsatisfiable: DoNotSchedule

          # nodeTaintsPolicy: Honor is what makes DoNotSchedule safe, and it is
          # the whole trick.
          #
          # Spread domains are computed from nodes. The default (Ignore) counts a
          # dead zone's nodes as a domain holding zero pods - so rescheduling into
          # a surviving zone breaches the skew and gets refused, which is exactly
          # the deadlock the old comment feared.
          #
          # Honor excludes nodes carrying taints the pod does not tolerate. A node
          # whose AZ has been cut off is tainted node.kubernetes.io/unreachable
          # within seconds; the witness tolerates only workload=app. So the dead
          # zone stops being a domain, the skew is computed across the survivors
          # alone, and the pods reschedule immediately.
          #
          # Steady state: the spread is mandatory. During the fault: the dead zone
          # evaporates from the calculation. Both properties, no tradeoff.
          nodeTaintsPolicy: Honor

          # minDomains is the line that actually forces the spread, and without it
          # DoNotSchedule is decoration.
          #
          # Spread is computed across domains that EXIST. Karpenter bin-packs, then
          # consolidateAfter reclaims the empty nodes, and five minutes after a
          # green deploy there is exactly one node in one zone. One domain. Skew 0.
          # The constraint is satisfied, perfectly, by the single point of failure
          # it was written to prevent.
          #
          # minDomains tells the scheduler to count MIN_DOMAINS domains whether or
          # not they have nodes. With 6 pods in one zone and minDomains 3, the
          # global minimum is 0, the skew is 6, DoNotSchedule refuses, the pods go
          # Pending - and Karpenter, which reacts to Pending pods, has no choice
          # but to launch capacity in the other zones.
          #
          # MIN_DOMAINS is substituted by scripts/bootstrap-cluster.sh from
          # len(workload_azs): 1 for infra-a, 3 for infra-b. It is the only value
          # in this file that differs between the two architectures, and it is
          # exactly the thing that differs between them - how many failure domains
          # they have. In infra-a, minDomains 1 makes the constraint a no-op, which
          # is honest: there is nowhere to spread to.
          minDomains: MIN_DOMAINS

          labelSelector:
            matchLabels:
              app.kubernetes.io/name: witness

      # Application pods belong on Karpenter-provisioned capacity, never on the
      # system node group. If they could land on the system nodes, the experiment
      # would be measuring a pre-warmed managed node group and Karpenter would
      # never be exercised at all.
      nodeSelector:
        karpenter.sh/nodepool: witness

      tolerations:
        - key: workload
          operator: Equal
          value: app
          effect: NoSchedule

      containers:
        - name: witness
          image: WITNESS_IMAGE
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: witness-config

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # -----------------------------------------------------------------
          # Probes
          #
          # Liveness never touches the database. Readiness always does. Getting
          # this backwards is the single most common way to turn a survivable
          # RDS failover into a cluster-wide crash-loop: every pod would fail
          # liveness at once, every pod would restart at once, and the outage
          # you measure would be one you caused.
          # -----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            # Aggressive on purpose. This interval is a floor on the measured
            # RTO. A 10s period would put ~10s of pure probe latency into every
            # recovery number and flatter neither architecture honestly.
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 2
            successThreshold: 1

          # Gives the NLB time to pull this target out of rotation before the
          # process stops answering.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Memory limit but no CPU limit. A CPU limit here would throttle
              # the pod exactly when it is retrying connections during a
              # failover - adding latency to the recovery being measured.
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: db-credentials
              mountPath: /etc/db
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: db-credentials
          secret:
            # Created by scripts/bootstrap-cluster.sh from the RDS-managed secret
            # in Secrets Manager. The password never appears in this repo, in the
            # Terraform state, or in a container env var.
            secretName: witness-db
            items:
              - key: password
                path: password
        - name: tmp
          emptyDir: {}
